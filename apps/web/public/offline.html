<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sem conexão · NotaFácil</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      text-align: center;
      padding: 32px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: #DBEAFE;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }
    p {
      color: #64748B;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    button {
      background: #3B82F6;
      color: white;
      border: 0;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #1D4ED8; }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #94A3B8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>Sem conexão</h1>
    <p>
      Não conseguimos carregar essa página agora — parece que você está offline.
      As notas já emitidas continuam disponíveis no celular.
    </p>
    <button onclick="window.location.reload()">Tentar novamente</button>
    <p class="hint">Conecte-se ao Wi-Fi ou aos dados móveis e recarregue.</p>
  </div>
</body>
</html>
