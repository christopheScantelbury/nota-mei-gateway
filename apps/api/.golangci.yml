linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - bodyclose
    - contextcheck
    - noctx

linters-settings:
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: error-return

run:
  timeout: 5m
  modules-download-mode: readonly
