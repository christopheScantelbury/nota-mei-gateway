version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - bodyclose
    - noctx
    - contextcheck

  settings:
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: error-return
    misspell:
      # ADN = Ambiente de Dados Nacional — official Brazilian fiscal acronym.
      # golangci-lint misspell incorrectly flags it as a misspelling of "AND".
      extra-words:
        - typo: "ADN"
          correction: "ADN"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-rules:
    # mustTest in test files uses t.Cleanup to close response bodies;
    # the linter cannot trace through t.Cleanup boundaries.
    - path: _test\.go
      linters:
        - bodyclose
    # Defer-close pattern in tests: _ = resp.Body.Close() not required
    # in test helpers that use t.Cleanup.
    - path: _test\.go
      text: "Error return value of .*(Body\\.Close)"
      linters:
        - errcheck
    # ADN = Ambiente de Dados Nacional — official Brazilian fiscal acronym,
    # not a misspelling of "AND".
    - text: "`ADN` is a misspelling"
      linters:
        - misspell

run:
  timeout: 5m
