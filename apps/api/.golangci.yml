version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - bodyclose
    - noctx
    - contextcheck

  settings:
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: error-return

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
