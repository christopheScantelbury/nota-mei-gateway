# Variáveis obrigatórias no painel Railway (não colocar valores aqui):
# DATABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# WEBHOOK_HMAC_SECRET      — segredo HMAC para assinar payloads de webhook
# RECEITA_API_URL          — URL da API Receita Federal (prod ou homologação)
# APP_ENV=production       — define o ambiente
#
# Soft-required (API sobe sem, mas features ficam degradadas):
# REDIS_URL, RABBITMQ_URL
# AWS_REGION, AWS_KMS_KEY_ARN, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
# STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET
# STRIPE_PRICE_STARTER, STRIPE_PRICE_BASIC, STRIPE_PRICE_PRO, STRIPE_PRICE_BUSINESS
#
# LOG_LEVEL=info, PORT (opcional; Railway injeta PORT automaticamente)

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
# Mesma política do railway.toml raiz — pacote único de deploy.
watchPatterns = [
  "apps/api/**",
  "Dockerfile",
  "apps/api/Dockerfile",
  "go.mod",
  "go.sum",
]

[deploy]
startCommand = "./server"
healthcheckPath = "/v1/health"
# 120s was too permissive — the server boots in < 5 s under normal conditions.
# 30s is ample headroom while still catching a genuine startup hang quickly.
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 2
