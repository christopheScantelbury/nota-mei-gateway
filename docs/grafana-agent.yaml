metrics:
  global:
    scrape_interval: 30s

  configs:
    - name: nota-mei-gateway
      scrape_configs:
        - job_name: api
          static_configs:
            - targets: ['localhost:8080']  # Railway private network
          metrics_path: /metrics

      remote_write:
        - url: ${GRAFANA_REMOTE_WRITE_URL}
          basic_auth:
            username: ${GRAFANA_USER_ID}
            password: ${GRAFANA_API_KEY}
