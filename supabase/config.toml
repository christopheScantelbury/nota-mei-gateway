project_id = "nota-mei-gateway"

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
sql_paths = ["./seed.sql"]

[studio]
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "https://emitirnotafacil.com.br"
additional_redirect_urls = [
  "http://127.0.0.1:3000",
  "http://localhost:3000",
  "https://emitirnotafacil.com.br/auth/callback",
  "https://nota-mei-gateway-web.vercel.app/auth/callback",
  "https://*.vercel.app/auth/callback",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
