<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; font-family: 'Google Sans', Arial, sans-serif; }
    body { margin: 0; padding: 16px; background: #fff; font-size: 13px; color: #202124; }
    h2 { margin: 0 0 16px; font-size: 16px; color: #0A0F1E; }
    label { display: block; font-weight: 500; margin: 12px 0 4px; }
    input[type="text"], input[type="password"], input[type="number"] {
      width: 100%; padding: 8px; border: 1px solid #dadce0; border-radius: 4px;
      font-size: 13px; outline: none;
    }
    input:focus { border-color: #00E8FF; }
    .row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
    .row label { margin: 0; flex: 1; }
    button {
      width: 100%; padding: 9px; margin-top: 8px; border: none; border-radius: 4px;
      font-size: 13px; cursor: pointer; font-weight: 600;
    }
    .btn-primary { background: #00E8FF; color: #0A0F1E; }
    .btn-secondary { background: #f1f3f4; color: #202124; }
    .msg { margin-top: 10px; padding: 8px; border-radius: 4px; font-size: 12px; }
    .msg.ok  { background: #e6f4ea; color: #137333; }
    .msg.err { background: #fce8e6; color: #c5221f; }
    hr { border: none; border-top: 1px solid #e8eaed; margin: 16px 0; }
    small { color: #80868b; }
  </style>
</head>
<body>
  <h2>⚙️ Nota MEI Gateway</h2>

  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="sk_live_... ou sk_test_..." autocomplete="off">
  <small>Disponível em notameigateway.com.br → API Keys</small>

  <label for="defaultNbs">Código NBS padrão</label>
  <input type="text" id="defaultNbs" placeholder="01.01.01.10">

  <label for="defaultAliquota">Alíquota ISS padrão (%)</label>
  <input type="number" id="defaultAliquota" step="0.01" min="0" max="10" placeholder="2.0">

  <hr>

  <div class="row">
    <label for="pollingAtivo">Atualizar status automaticamente (a cada 2 min)</label>
    <input type="checkbox" id="pollingAtivo">
  </div>

  <button class="btn-primary" onclick="salvar()">Salvar configurações</button>
  <button class="btn-secondary" onclick="testar()" style="margin-top:6px">Testar conexão com a API</button>

  <div id="msg" class="msg" style="display:none"></div>

  <script>
    google.script.run
      .withSuccessHandler(function (settings) {
        document.getElementById('apiKey').value          = settings.apiKey;
        document.getElementById('defaultNbs').value      = settings.defaultNbs;
        document.getElementById('defaultAliquota').value = settings.defaultAliquota;
        document.getElementById('pollingAtivo').checked  = settings.pollingAtivo;
      })
      .getSettingsForSidebar();

    function salvar() {
      var form = {
        apiKey:          document.getElementById('apiKey').value.trim(),
        defaultNbs:      document.getElementById('defaultNbs').value.trim(),
        defaultAliquota: document.getElementById('defaultAliquota').value.trim(),
        pollingAtivo:    document.getElementById('pollingAtivo').checked,
      };
      showMsg('Salvando...', '');
      google.script.run
        .withSuccessHandler(function () { showMsg('Configurações salvas.', 'ok'); })
        .withFailureHandler(function (e) { showMsg('Erro: ' + e.message, 'err'); })
        .salvarConfiguracoes(form);
    }

    function testar() {
      showMsg('Testando...', '');
      google.script.run
        .withSuccessHandler(function (r) { showMsg(r.message, r.ok ? 'ok' : 'err'); })
        .withFailureHandler(function (e) { showMsg('Erro: ' + e.message, 'err'); })
        .testarConexao();
    }

    function showMsg(text, type) {
      var el = document.getElementById('msg');
      el.textContent  = text;
      el.className    = 'msg' + (type ? ' ' + type : '');
      el.style.display = text ? 'block' : 'none';
    }
  </script>
</body>
</html>
