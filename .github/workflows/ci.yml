name: CI

# Roda apenas em PRs — nunca em push direto ao main/develop.
# O código já foi validado pelo CI do PR antes do merge; rodar de novo
# no push ao main desperdiça minutos sem benefício.
#
# Jobs especializados com path filters:
#   ci-api.yml  — Go lint + test   (só quando apps/api/** muda)
#   ci-web.yml  — Next.js build    (só quando apps/web/** muda)
#   ci-db.yml   — Supabase schema  (só quando supabase/** muda)

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/load-test-report.md'
      - 'docs/architecture.md'

# Cancel in-progress runs for the same PR when new commits push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-validate:
    name: Docker Compose validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config

  supabase-schema:
    name: Supabase — migrations + seed (Postgres 15)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      PGPASSWORD: postgres
      PGHOST: localhost
      PGUSER: postgres
      PGDATABASE: postgres
      PGPORT: 5432
    steps:
      - uses: actions/checkout@v4
      - name: Instalar cliente PostgreSQL
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Stub auth e roles (paridade Supabase local)
        run: |
          psql -v ON_ERROR_STOP=1 <<'EOSQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid
          LANGUAGE sql STABLE
          AS $$ SELECT NULL::uuid $$;
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role NOLOGIN;
            END IF;
          END
          $$;
          EOSQL
      - name: Aplicar migrations
        run: |
          set -euo pipefail
          for f in supabase/migrations/*.sql; do
            psql -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Seed
        run: psql -v ON_ERROR_STOP=1 -f supabase/seed.sql
      - name: Verificar seed planos
        run: |
          count=$(psql -tAc "SELECT COUNT(*) FROM planos")
          test "$count" = "5"

  test-api:
    name: Go lint + test
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: apps/api/go.sum

      - name: Download deps
        run: go mod download

      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Lint
        run: golangci-lint run --timeout=5m

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

      - name: Coverage
        run: go tool cover -func=coverage.out

  openapi-lint:
    name: OpenAPI 3.1 lint + TypeScript types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint OpenAPI spec
        run: npx @redocly/cli lint docs/openapi.yaml --format=github-actions

      - name: Generate TypeScript types
        run: npx openapi-typescript docs/openapi.yaml -o apps/web/lib/api-types.ts

      - name: Check generated types compile
        working-directory: apps/web
        run: npx tsc --noEmit --strict apps/web/lib/api-types.ts 2>/dev/null || npx tsc --noEmit lib/api-types.ts

  test-web:
    name: Next.js lint + build
    runs-on: ubuntu-latest
    needs: openapi-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Build
        working-directory: apps/web
        run: npm run build
