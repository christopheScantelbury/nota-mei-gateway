name: E2E — Integration

# Runs on every push to main and on pull requests to main.
# Spins up a full stack (postgres, redis, rabbitmq) locally in CI,
# builds the API binary, and runs the E2E test suite.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_url:
        description: "Override API URL (leave blank to run local stack)"
        required: false
        default: ""

jobs:
  e2e:
    name: E2E integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports:
          - 5672:5672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=10

    env:
      APP_ENV: staging
      PORT: "8080"
      LOG_LEVEL: warn
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsaG9zdCIsInJvbGUiOiJzZXJ2aWNlX3JvbGUifQ.local_dev_only
      REDIS_URL: redis://localhost:6379
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      WEBHOOK_HMAC_SECRET: e2e-test-secret-local
      RECEITA_API_URL: https://homologacao.nfse.gov.br/m/app/api/recepcionar-lote-rps/v1
      API_BASE_URL: http://localhost:8080
      AWS_REGION: sa-east-1
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }}
      STRIPE_PRICE_STARTER: price_1TT2gTHImHeWw3exWO3O5V4m
      STRIPE_PRICE_BASIC: price_1TT2gUHImHeWw3exmsVBCE8F
      STRIPE_PRICE_PRO: price_1TT2gVHImHeWw3exmF1hu0Qt
      STRIPE_PRICE_BUSINESS: price_1TT2gWHImHeWw3exu1jsb1Ag

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: apps/api/go.sum

      # ── Database setup ────────────────────────────────────────────────────
      - name: Instalar postgresql-client
        run: sudo apt-get update -qq && sudo apt-get install -y postgresql-client

      - name: Stub auth schema (paridade Supabase)
        env:
          PGPASSWORD: postgres
          PGHOST: localhost
          PGUSER: postgres
          PGDATABASE: postgres
          PGPORT: 5432
        run: |
          psql -v ON_ERROR_STOP=1 <<'EOSQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid
            LANGUAGE sql STABLE AS $$ SELECT NULL::uuid $$;
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon NOLOGIN; END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated NOLOGIN; END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role NOLOGIN; END IF;
          END $$;
          EOSQL

      - name: Aplicar migrations
        env:
          PGPASSWORD: postgres
          PGHOST: localhost
          PGUSER: postgres
          PGDATABASE: postgres
          PGPORT: 5432
        run: |
          set -euo pipefail
          for f in supabase/migrations/*.sql; do
            psql -v ON_ERROR_STOP=1 -f "$f"
          done
          psql -v ON_ERROR_STOP=1 -f supabase/seed.sql

      # ── Build & start API ─────────────────────────────────────────────────
      - name: Build API server
        working-directory: apps/api
        run: go build -o /tmp/api-server ./cmd/server

      - name: Start API server
        run: /tmp/api-server &
        env:
          APP_ENV: staging
          PORT: "8080"
          LOG_LEVEL: warn
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2FsaG9zdCIsInJvbGUiOiJzZXJ2aWNlX3JvbGUifQ.local_dev_only
          REDIS_URL: redis://localhost:6379
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
          WEBHOOK_HMAC_SECRET: e2e-test-secret-local
          RECEITA_API_URL: https://homologacao.nfse.gov.br/m/app/api/recepcionar-lote-rps/v1
          API_BASE_URL: http://localhost:8080
          AWS_REGION: sa-east-1
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }}
          STRIPE_PRICE_STARTER: price_1TT2gTHImHeWw3exWO3O5V4m
          STRIPE_PRICE_BASIC: price_1TT2gUHImHeWw3exmsVBCE8F
          STRIPE_PRICE_PRO: price_1TT2gVHImHeWw3exmF1hu0Qt
          STRIPE_PRICE_BUSINESS: price_1TT2gWHImHeWw3exu1jsb1Ag

      - name: Aguardar API inicializar
        run: |
          for i in $(seq 1 20); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/v1/health || echo "000")
            echo "tentativa $i: HTTP $status"
            if [ "$status" = "200" ]; then echo "API pronta ✅"; break; fi
            if [ "$i" = "20" ]; then echo "❌ API não iniciou" && exit 1; fi
            sleep 2
          done

      # ── Run E2E tests ─────────────────────────────────────────────────────
      - name: Run E2E tests
        working-directory: apps/api
        run: |
          go test -v -timeout=5m -tags=e2e \
            ../../tests/e2e/ \
            2>&1 | tee /tmp/e2e-report.txt
        env:
          E2E_API_URL: http://localhost:8080

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.run_id }}
          path: /tmp/e2e-report.txt
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 /tmp/e2e-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
