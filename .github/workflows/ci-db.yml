name: CI — Supabase migrations

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'supabase/**'
      - '.github/workflows/ci-db.yml'

# Cancel in-progress runs for the same PR when new commits push
concurrency:
  group: ci-db-${{ github.ref }}
  cancel-in-progress: true

jobs:
  supabase-schema:
    name: Supabase — migrations + seed (Postgres 15)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      PGPASSWORD: postgres
      PGHOST: localhost
      PGUSER: postgres
      PGDATABASE: postgres
      PGPORT: 5432
    steps:
      - uses: actions/checkout@v4
      - name: Instalar cliente PostgreSQL
        run: sudo apt-get update -qq && sudo apt-get install -y postgresql-client
      - name: Stub auth e roles (paridade Supabase local)
        run: |
          psql -v ON_ERROR_STOP=1 <<'EOSQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid
          LANGUAGE sql STABLE
          AS $$ SELECT NULL::uuid $$;
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role NOLOGIN;
            END IF;
          END
          $$;
          EOSQL
      - name: Aplicar migrations
        run: |
          set -euo pipefail
          for f in supabase/migrations/*.sql; do
            psql -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Seed
        run: psql -v ON_ERROR_STOP=1 -f supabase/seed.sql
      - name: Verificar seed planos
        run: |
          count=$(psql -tAc "SELECT COUNT(*) FROM planos")
          # 5 planos MEI (Trial/Starter/Basic/Pro/Business) + 1 plano ME (Trial ME)
          # adicionado pela migration 20260506000002_me_ep1_empresas_extras.sql
          test "$count" = "6"
