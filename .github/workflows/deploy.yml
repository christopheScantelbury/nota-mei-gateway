name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::notice title=Deploy API::RAILWAY_TOKEN não definido no repositório — deploy Railway ignorado."
            exit 0
          fi
          railway up --service api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Deploy
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::notice title=Deploy Web::Secrets VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID incompletos — deploy Vercel ignorado."
            exit 0
          fi
          vercel --prod --token="$VERCEL_TOKEN" --yes
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
