name: Deploy

on:
  push:
    branches: [main, develop]

jobs:
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy
        env:
          REF_NAME: ${{ github.ref_name }}
          RAILWAY_TOKEN_MAIN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_TOKEN_STAGING: ${{ secrets.RAILWAY_TOKEN_STAGING }}
          SVC_PROD: ${{ vars.RAILWAY_SERVICE_PROD }}
          SVC_STAGING: ${{ vars.RAILWAY_SERVICE_STAGING }}
        run: |
          SPROD="${SVC_PROD:-api}"
          SSTG="${SVC_STAGING:-api-staging}"
          if [ "$REF_NAME" = "main" ]; then
            if [ -z "$RAILWAY_TOKEN_MAIN" ]; then
              echo "::notice title=Deploy API (prod)::RAILWAY_TOKEN não definido — deploy ignorado."
              exit 0
            fi
            export RAILWAY_TOKEN="$RAILWAY_TOKEN_MAIN"
            railway up --service "$SPROD" --detach
          else
            if [ -z "$RAILWAY_TOKEN_STAGING" ]; then
              echo "::notice title=Deploy API (staging)::RAILWAY_TOKEN_STAGING não definido — deploy develop ignorado."
              exit 0
            fi
            export RAILWAY_TOKEN="$RAILWAY_TOKEN_STAGING"
            railway up --service "$SSTG" --detach
          fi

  # deploy-web removido: Vercel Git integration já faz deploy automático no push.
  # Rodar vercel --prod via CLI em paralelo causava dois builds simultâneos com
  # cache conflict — o CLI restaurava cache antigo e sobrescrevia o build correto.
